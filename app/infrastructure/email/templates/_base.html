<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Jinbocho</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    {% include "_styles.css" %}
  </style>
</head>
<body class="email-outer">

  <!-- Preheader: hidden preview text shown by email clients -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#f8f7f4;">
    {% block preheader %}{% endblock %}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="email-outer">
    <tr>
      <td align="center" class="email-outer-cell">

        <table role="presentation" class="email-card" width="600" cellpadding="0" cellspacing="0">

          <!-- ─── HEADER ──────────────────────────────────── -->
          <tr>
            <td class="email-header" bgcolor="#111111" style="background-color:#111111;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <!-- Logo is attached as a cid: inline image by EmailSender._send, not a
                         data-URI: Gmail strips base64 image sources and Outlook's Word engine
                         ignores SVG data URIs, so both rendered this as blank space before. -->
                    <table role="presentation" cellpadding="0" cellspacing="0" align="center" style="margin:0 auto;">
                      <tr>
                        <td width="44" height="44" align="center" valign="middle" style="width:44px;height:44px;">
                          <img src="cid:jinbocho-logo" alt="Jinbocho" width="44" height="44" style="display:block;width:44px;height:44px;border:0;" />
                        </td>
                        <td width="14" style="font-size:0;line-height:0;">&nbsp;</td>
                        <td valign="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#ffffff !important;font-size:26px;font-weight:700;letter-spacing:0.06em;">Jinbocho</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ─── RED ACCENT BAR ─────────────────────────── -->
          <tr>
            <td class="accent-bar" bgcolor="#bc002d" style="background-color:#bc002d;height:4px;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <!-- ─── BODY ───────────────────────────────────── -->
          <tr>
            <td class="email-body" bgcolor="#ffffff" style="background-color:#ffffff;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- ─── FOOTER ─────────────────────────────────── -->
          <tr>
            <td class="email-footer" bgcolor="#f8f7f4" style="background-color:#f8f7f4;">
              <p class="footer-text" style="margin:0;color:#777777 !important;font-size:12px;line-height:1.6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
                Jinbocho &mdash; {% block footer_text %}Home Library Management{% endblock %}
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
